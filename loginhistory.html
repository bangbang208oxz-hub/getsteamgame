<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login History - Ex_Ascent - TH</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page-transition" id="page-transition"></div>
    <div class="notification" id="notification"></div>
    <header>
        <div class="container nav-wrapper">
            <a class="logo" href="index.html">
                <img alt="Logo" src="logo.jpg" />
                Ex_Ascent - TH
            </a>
            <div class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav id="nav-list">
                <ul>
                    <li>
                        <a href="index.html">Home</a>
                    </li>
                    <li>
                        <a href="howtoinstall.html">How to install</a>
                    </li>
                    <li>
                        <a href="more.html">More</a>
                    </li>
                    <li class="auth-dropdown">
                        <a class="btn-discord-nav" id="auth-btn" onclick="handleAuth()">Login</a>
                        <div class="dropdown-menu" id="dropdown-menu" style="display: none;">
                            <a href="loginhistory.html">Login History</a>
                            <a href="https://discord.gg/TA26XCrdEG" target="_blank">Discord</a>
                            <a onclick="logout()">Logout</a>
                        </div>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="page-section" style="display: block;">
            <div class="hero">
                <div class="badge">
                    <span style="color: #3b82f6; margin-right: 8px;">●</span>
                    Login History
                </div>
                <h1>ประวัติการ Login</h1>
                <p class="subtitle">ดูประวัติการเข้าสู่ระบบของผู้ใช้ทั้งหมด</p>
            </div>

            <div class="card" style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 30px; max-width: 800px; margin: 0 auto;">
                <div id="login-history-list" style="display: flex; flex-direction: column; gap: 12px;">
                    <p style="color: var(--text-dim); text-align: center;">Loading login history...</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>© 2026 <strong>Ex_Ascent - TH</strong> All rights reserved.</p>
        </div>
    </footer>
    <script src="script.js"></script>
    <script>
        function loadLoginHistory() {
            const loginHistory = JSON.parse(localStorage.getItem('login_history') || '[]');
            const container = document.getElementById('login-history-list');

            if (loginHistory.length === 0) {
                container.innerHTML = '<p style="color: var(--text-dim); text-align: center;">No login history yet.</p>';
                return;
            }

            container.innerHTML = loginHistory.reverse().map((login, index) => {
                const avatarUrl = login.avatar && login.userId ? `https://cdn.discordapp.com/avatars/${login.userId}/${login.avatar}.png?size=128` : `https://cdn.discordapp.com/embed/avatars/${parseInt(login.userId) % 5}.png?size=128`;
                return `
                <div style="display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 16px;">
                    <img src="${avatarUrl}" alt="${login.username}" style="width: 48px; height: 48px; border-radius: 12px; object-fit: cover;" />
                    <div style="flex: 1;">
                        <div style="font-weight: 600; color: #fff; margin-bottom: 4px;">${login.username || 'Unknown User'}</div>
                        <div style="font-size: 0.85rem; color: var(--text-dim);">ID: ${login.userId || 'N/A'}</div>
                        <div style="font-size: 0.85rem; color: var(--text-dim); margin-top: 2px;">IP: ${login.ip || 'N/A'}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.85rem; color: var(--text-dim);">${new Date(login.timestamp).toLocaleString()}</div>
                    </div>
                </div>
            `}).join('');
        }

        document.addEventListener('DOMContentLoaded', loadLoginHistory);
    </script>
</body>

</html>
